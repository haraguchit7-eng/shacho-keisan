<h2>運営目的</h2>

<p>
本サイトは、中小企業経営者や個人事業主が、
経営数字を簡単に把握できるようにすることを目的として運営しています。
損益分岐点、利益率、借入返済、資金繰り、人件費率など、
経営判断に必要な数字を無料で確認できるツールや解説記事を掲載しています。
  <p>
数字が苦手な方でも、直感的に経営状態を把握できるサイトを目指しています。
</p>
